<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sabicars Admin Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, sans-serif; background:#0d0d0d; color:#eee; min-height:100vh; }
  .center { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .card { background:#1a1a1a; border:1px solid #333; border-radius:10px; padding:36px; width:100%; max-width:380px; }
  .card h1 { font-size:1.4rem; margin-bottom:6px; color:#d4af37; }
  .card p { font-size:.85rem; color:#999; margin-bottom:24px; }
  input, select, textarea { width:100%; padding:11px; margin-bottom:14px; background:#252525; border:1px solid #3a3a3a; border-radius:6px; color:#eee; font-size:.9rem; }
  button { width:100%; padding:12px; background:#d4af37; color:#000; border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:.9rem; }
  button:hover { background:#c19b2e; }
  .error { color:#ff6b6b; font-size:.8rem; margin-bottom:10px; display:none; }
  #dashboard { display:none; padding:24px; max-width:1100px; margin:0 auto; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:10px; }
  .topbar h2 { color:#d4af37; }
  .logout-btn { width:auto; padding:8px 16px; background:#333; color:#eee; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  @media(max-width:800px){ .grid { grid-template-columns:1fr; } }
  .panel { background:#1a1a1a; border:1px solid #333; border-radius:10px; padding:20px; }
  .panel h3 { color:#d4af37; margin-bottom:16px; font-size:1rem; }
  .car-row { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #2a2a2a; font-size:.85rem; flex-wrap:wrap; gap:6px; }
  .car-row:last-child { border-bottom:none; }
  .car-info { flex:1; min-width:0; }
  .car-actions { display:flex; flex-wrap:wrap; gap:4px; }
  .car-actions button { width:auto; padding:6px 10px; font-size:.75rem; }
  .del-btn { background:#c0392b; color:#fff; }
  .edit-btn { background:#3a3a3a; color:#eee; }
  .sold-btn { background:#1d4ed8; color:#fff; }
  .row2 { display:flex; gap:10px; }
  .row2 > * { flex:1; }
  .msg { font-size:.85rem; padding:12px; border-radius:6px; margin-bottom:12px; display:none; line-height:1.5; font-weight:600; }
  .msg.success { background:#1e3a24; color:#7ee08a; border:1px solid #2e5e2e; }
  .msg.error { background:#3a1e1e; color:#ff6b6b; border:1px solid #5e2e2e; }
  .editing-banner { background:#1a2e1a; border:1px solid #2e5e2e; border-radius:6px; padding:8px 12px; margin-bottom:12px; font-size:.8rem; color:#7ee08a; display:none; }
  .photo-thumb { position:relative; width:72px; height:56px; }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; border-radius:4px; border:2px solid #3a3a3a; }
  .photo-thumb.removed img { border-color:#c0392b; opacity:.35; }
  .photo-thumb .rm-btn { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:#c0392b; color:#fff; border:none; font-size:11px; cursor:pointer; padding:0; line-height:18px; text-align:center; }
  .section-label { font-size:.8rem; color:#999; margin-bottom:8px; }
  .btn-loading { opacity:.65; pointer-events:none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="center" id="loginScreen">
  <div class="card">
    <h1>🚗 Sabicars Admin</h1>
    <p>Login to manage inventory</p>
    <div class="error" id="loginError"></div>
    <input type="text" id="username" placeholder="Username"/>
    <input type="password" id="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <h2>Sabicars Inventory Manager</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="grid">
    <div class="panel">
      <h3 id="formTitle">Add New Car</h3>
      <div class="editing-banner" id="editingBanner">✏️ Editing existing car — update fields then click "Update Car"</div>
      <div class="msg" id="formMsg"></div>

      <div class="row2">
        <input type="text" id="make" placeholder="Make (e.g. Toyota)"/>
        <input type="text" id="model" placeholder="Model (e.g. Highlander)"/>
      </div>
      <div class="row2">
        <input type="text" id="year" placeholder="Year"/>
        <select id="category">
          <option value="regular">Regular</option>
          <option value="luxury">Luxury</option>
          <option value="suv">SUV</option>
          <option value="bus">Bus / Hiace</option>
          <option value="truck">Truck</option>
        </select>
      </div>
      <div class="row2">
        <select id="condition">
          <option value="foreign-used" selected>Foreign Used</option>
          <option value="nigeria-used">Nigeria Used</option>
          <option value="brand-new">Brand New</option>
        </select>
        <select id="bodyType">
          <option value="">Body Type (optional)</option>
          <option value="suv">SUV</option>
          <option value="sedan">Sedan</option>
          <option value="coupe">Coupe</option>
          <option value="truck">Truck</option>
          <option value="bus">Bus / Van</option>
          <option value="pickup">Pickup</option>
          <option value="convertible">Convertible</option>
          <option value="hatchback">Hatchback</option>
        </select>
      </div>
      <div class="row2">
        <input type="text" id="price" placeholder="Price (e.g. ₦25,000,000)"/>
        <input type="text" id="mileage" placeholder="Mileage (e.g. 45,000)"/>
      </div>
      <div class="row2">
        <input type="text" id="fuel" placeholder="Fuel (e.g. Petrol)"/>
        <input type="text" id="colour" placeholder="Exterior Colour"/>
      </div>
      <div class="row2">
        <input type="text" id="engine" placeholder="Engine (e.g. 3.5L V6)"/>
        <input type="text" id="horsepower" placeholder="Horsepower (e.g. 295hp)"/>
      </div>
      <div class="row2">
        <input type="text" id="transmission" placeholder="Transmission (e.g. Automatic)"/>
        <input type="text" id="drivetrain" placeholder="Drivetrain (e.g. AWD)"/>
      </div>
      <div class="row2">
        <input type="text" id="interiorColor" placeholder="Interior Colour"/>
        <input type="text" id="seats" placeholder="Seats (e.g. 7)"/>
      </div>

      <div style="margin-bottom:14px;">
        <p class="section-label">Features</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;" id="featuresBox">
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Air Conditioning" style="width:auto;margin:0;"> Air Conditioning</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Leather Seats" style="width:auto;margin:0;"> Leather Seats</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Sunroof" style="width:auto;margin:0;"> Sunroof</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Navigation System" style="width:auto;margin:0;"> Navigation System</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Reverse Camera" style="width:auto;margin:0;"> Reverse Camera</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Bluetooth" style="width:auto;margin:0;"> Bluetooth</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Cruise Control" style="width:auto;margin:0;"> Cruise Control</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Keyless Entry" style="width:auto;margin:0;"> Keyless Entry</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Heated Seats" style="width:auto;margin:0;"> Heated Seats</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Third Row Seating" style="width:auto;margin:0;"> Third Row Seating</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Alloy Wheels" style="width:auto;margin:0;"> Alloy Wheels</label>
          <label style="font-size:.82rem;display:flex;align-items:center;gap:6px;"><input type="checkbox" value="Parking Sensors" style="width:auto;margin:0;"> Parking Sensors</label>
        </div>
      </div>

      <select id="tag">
        <option value="new">New In</option>
        <option value="hot">Hot</option>
        <option value="premium">Premium</option>
        <option value="supply">Fleet Supply</option>
        <option value="sold">Sold</option>
      </select>
      <textarea id="description" placeholder="Description" rows="3"></textarea>

      <div id="currentPhotosSection" style="display:none;margin-bottom:14px;">
        <p class="section-label">Current Photos <span style="font-size:.72rem;color:#666;">— tap × to remove</span></p>
        <div id="currentPhotoGrid" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>

      <input type="file" id="images" multiple accept="image/*" style="padding:8px;"/>
      <p style="font-size:.75rem;color:#666;margin-bottom:12px;" id="imgHint">Choose up to 12 photos</p>

      <button id="saveBtn" onclick="saveCar()">Add Car</button>
      <button id="cancelEditBtn" onclick="cancelEdit()" style="display:none;background:#3a3a3a;color:#eee;margin-top:8px;">✕ Cancel Edit</button>
    </div>

    <div class="panel">
      <h3>Current Inventory (<span id="carCount">0</span>)</h3>
      <div id="carList"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://sabicars-api.onrender.com/api';
let token = localStorage.getItem('sabicars_token');
let currentCars = [];
let editingCarId = null;
let keptImages = [];
let allCarImages = [];

if (token) showDashboard();

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Please enter username and password.';
    errEl.style.display = 'block';
    return;
  }
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      token = data.token;
      localStorage.setItem('sabicars_token', token);
      showDashboard();
    } else {
      errEl.textContent = data.message || 'Login failed.';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = 'Connection error. Server may be sleeping — try again in 30 seconds.';
    errEl.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('sabicars_token');
  token = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadCars();
}

async function loadCars() {
  try {
    const res = await fetch(`${API}/cars/admin/all`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) { logout(); return; }
    currentCars = data.cars;
    document.getElementById('carCount').textContent = data.count;
    const list = document.getElementById('carList');
    list.innerHTML = data.cars.map(car => `
      <div class="car-row">
        <div class="car-info">
          <strong>${car.make} ${car.model}</strong> (${car.year})<br/>
          <span style="color:#999;font-size:.8rem;">${car.price} · ${car.category}${car.bodyType ? ' / '+car.bodyType : ''} ${car.available ? '' : '· <span style="color:#c0392b">SOLD</span>'}</span>
        </div>
        <div class="car-actions">
          <button class="edit-btn" onclick="editCar('${car._id}')">Edit</button>
          <button class="${car.available ? 'sold-btn' : 'edit-btn'}" onclick="toggleAvailable('${car._id}', ${car.available})">${car.available ? 'Mark Sold' : 'Available'}</button>
          <button class="del-btn" onclick="deleteCar('${car._id}')">Delete</button>
        </div>
      </div>
    `).join('') || '<p style="color:#666">No cars yet. Add one!</p>';
  } catch (err) {
    console.error(err);
  }
}

function renderCurrentPhotos(images) {
  allCarImages = [...images];
  keptImages = [...images];
  const grid = document.getElementById('currentPhotoGrid');
  grid.innerHTML = images.map((url, i) => `
    <div class="photo-thumb" id="pthumb-${i}">
      <img src="${url}"/>
      <button class="rm-btn" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(i) {
  const url = allCarImages[i];
  keptImages = keptImages.filter(u => u !== url);
  const thumb = document.getElementById(`pthumb-${i}`);
  if (thumb) thumb.classList.add('removed');
}

function editCar(id) {
  const car = currentCars.find(c => c._id === id);
  if (!car) return;

  document.getElementById('make').value = car.make || '';
  document.getElementById('model').value = car.model || '';
  document.getElementById('year').value = car.year || '';
  document.getElementById('category').value = car.category || 'regular';
  document.getElementById('condition').value = car.condition || 'foreign-used';
  document.getElementById('bodyType').value = car.bodyType || '';
  document.getElementById('price').value = car.price || '';
  document.getElementById('mileage').value = car.mileage || '';
  document.getElementById('fuel').value = car.fuel || '';
  document.getElementById('colour').value = car.colour || '';
  document.getElementById('tag').value = car.tag || 'new';
  document.getElementById('description').value = car.description || '';
  document.getElementById('engine').value = car.engine || '';
  document.getElementById('horsepower').value = car.horsepower || '';
  document.getElementById('transmission').value = car.transmission || '';
  document.getElementById('drivetrain').value = car.drivetrain || '';
  document.getElementById('interiorColor').value = car.interiorColor || '';
  document.getElementById('seats').value = car.seats || '';

  document.querySelectorAll('#featuresBox input[type="checkbox"]').forEach(cb => {
    cb.checked = (car.features || []).includes(cb.value);
  });

  document.getElementById('images').value = '';
  document.getElementById('imgHint').textContent = 'Leave empty to keep existing photos, or pick new ones to add';
  document.getElementById('currentPhotosSection').style.display = 'block';
  renderCurrentPhotos(car.images || []);

  editingCarId = id;
  document.getElementById('saveBtn').textContent = 'Update Car';
  document.getElementById('cancelEditBtn').style.display = 'block';
  document.getElementById('formTitle').textContent = 'Edit Car';
  document.getElementById('editingBanner').style.display = 'block';
  document.getElementById('formMsg').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Resets the form WITHOUT hiding the message — used after successful save
function resetForm() {
  editingCarId = null;
  keptImages = [];
  allCarImages = [];
  document.querySelectorAll('#dashboard input[type="text"], #dashboard textarea').forEach(el => el.value = '');
  document.querySelectorAll('#featuresBox input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.getElementById('images').value = '';
  document.getElementById('imgHint').textContent = 'Choose up to 12 photos';
  document.getElementById('category').value = 'regular';
  document.getElementById('condition').value = 'foreign-used';
  document.getElementById('bodyType').value = '';
  document.getElementById('tag').value = 'new';
  document.getElementById('saveBtn').textContent = 'Add Car';
  document.getElementById('saveBtn').classList.remove('btn-loading');
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('formTitle').textContent = 'Add New Car';
  document.getElementById('editingBanner').style.display = 'none';
  document.getElementById('currentPhotosSection').style.display = 'none';
  document.getElementById('currentPhotoGrid').innerHTML = '';
}

// Cancel button — resets AND hides message
function cancelEdit() {
  resetForm();
  document.getElementById('formMsg').style.display = 'none';
}

function showMsg(type, text, autoDismissMs) {
  const msgEl = document.getElementById('formMsg');
  msgEl.className = `msg ${type}`;
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  if (autoDismissMs) {
    setTimeout(() => { msgEl.style.display = 'none'; }, autoDismissMs);
  }
}

async function saveCar() {
  const saveBtn = document.getElementById('saveBtn');
  const isEditing = !!editingCarId;

  const make = document.getElementById('make').value.trim();
  const model = document.getElementById('model').value.trim();
  const year = document.getElementById('year').value.trim();
  const price = document.getElementById('price').value.trim();

  if (!make) { showMsg('error', '❌ Make is required (e.g. Toyota)'); return; }
  if (!model) { showMsg('error', '❌ Model is required (e.g. Highlander)'); return; }
  if (!year) { showMsg('error', '❌ Year is required'); return; }
  if (!price) { showMsg('error', '❌ Price is required'); return; }

  // Collect features before anything resets
  const selectedFeatures = [...document.querySelectorAll('#featuresBox input[type="checkbox"]:checked')].map(cb => cb.value);

  const formData = new FormData();
  formData.append('make', make);
  formData.append('model', model);
  formData.append('year', year);
  formData.append('category', document.getElementById('category').value);
  formData.append('condition', document.getElementById('condition').value);
  formData.append('bodyType', document.getElementById('bodyType').value);
  formData.append('price', price);
  formData.append('mileage', document.getElementById('mileage').value);
  formData.append('fuel', document.getElementById('fuel').value);
  formData.append('colour', document.getElementById('colour').value);
  formData.append('tag', document.getElementById('tag').value);
  formData.append('description', document.getElementById('description').value);
  formData.append('engine', document.getElementById('engine').value);
  formData.append('horsepower', document.getElementById('horsepower').value);
  formData.append('transmission', document.getElementById('transmission').value);
  formData.append('drivetrain', document.getElementById('drivetrain').value);
  formData.append('interiorColor', document.getElementById('interiorColor').value);
  formData.append('seats', document.getElementById('seats').value);

  if (isEditing) {
    formData.append('imagesManaged', 'true');
    keptImages.forEach(url => formData.append('keepImages', url));
  }

  for (let file of document.getElementById('images').files) {
    formData.append('images', file);
  }

  const originalBtnText = saveBtn.textContent;
  saveBtn.textContent = isEditing ? '⏳ Updating...' : '⏳ Uploading...';
  saveBtn.classList.add('btn-loading');

  try {
    // Step 1 — save car + images
    const res = await fetch(isEditing ? `${API}/cars/${editingCarId}` : `${API}/cars`, {
      method: isEditing ? 'PUT' : 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });
    const data = await res.json();

    if (!data.success) {
      saveBtn.textContent = originalBtnText;
      saveBtn.classList.remove('btn-loading');
      showMsg('error', '❌ ' + (data.message || 'Something went wrong.'));
      return;
    }

    // Step 2 — save features via clean JSON request
    const carId = isEditing ? editingCarId : data.car._id;
    await fetch(`${API}/cars/${carId}/features`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ features: selectedFeatures })
    });

    // Reset form first, then show message — message won't be hidden by reset
    resetForm();
    showMsg('success', isEditing ? '✅ Car updated successfully!' : '✅ Car added to inventory!', 6000);
    loadCars();

  } catch (err) {
    saveBtn.textContent = originalBtnText;
    saveBtn.classList.remove('btn-loading');
    showMsg('error', '❌ Network error — check your connection and try again.');
  }
}

async function toggleAvailable(id, currentlyAvailable) {
  const car = currentCars.find(c => c._id === id);
  const formData = new FormData();
  formData.append('available', !currentlyAvailable);
  formData.append('imagesManaged', 'true');
  if (car && car.images) car.images.forEach(url => formData.append('keepImages', url));
  await fetch(`${API}/cars/${id}`, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${token}` },
    body: formData
  });
  loadCars();
}

async function deleteCar(id) {
  if (!confirm('Delete this car permanently? This cannot be undone.')) return;
  const res = await fetch(`${API}/cars/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  if (data.success) loadCars();
  else alert('Delete failed: ' + data.message);
}
</script>
</body>
</html>
